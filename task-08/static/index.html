<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Sensor Dashboard</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 2rem;
        }
        .dashboard-container {
            display: flex;
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
        }
        .chart-card {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5);
            flex: 2;
            min-height: 400px;
        }
        .stats-card {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5);
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #334155;
        }
        .stat-value {
            font-weight: bold;
            font-size: 1.2rem;
            color: #e2e8f0;
        }
        .stat-value.critical { color: #ef4444; }
        .stat-value.warning { color: #f59e0b; }
        .stat-value.normal { color: #10b981; }
        
        .alert-log {
            margin-top: 1rem;
            flex: 1;
            overflow-y: auto;
            max-height: 200px;
            background: #0f172a;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #334155;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .alert-item {
            margin-bottom: 0.5rem;
            color: #ef4444;
            border-left: 3px solid #ef4444;
            padding-left: 0.5rem;
        }
        .connection-status {
            margin-top: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #ef4444; /* red by default */
        }
        .dot.connected {
            background-color: #10b981; /* green */
        }
    </style>
</head>
<body>

    <h1>Real-Time Factory Dashboard</h1>

    <div class="dashboard-container">
        <!-- Chart Widget -->
        <div class="chart-card">
            <canvas id="sensorChart"></canvas>
        </div>

        <!-- Stats and Alerts Widget -->
        <div class="stats-card">
            <h3>Sensor T1 Status</h3>
            <div class="stat-row">
                <span>Temperature:</span>
                <span id="valTemp" class="stat-value">-- °F</span>
            </div>
            <div class="stat-row">
                <span>5-Min Avg:</span>
                <span id="valAvg" class="stat-value">-- °F</span>
            </div>
            <div class="stat-row">
                <span>Vibration:</span>
                <span id="valVib" class="stat-value">-- g</span>
            </div>
            <div class="stat-row">
                <span>Z-Score:</span>
                <span id="valZ" class="stat-value">--</span>
            </div>
            <div class="stat-row">
                <span>Status:</span>
                <span id="valStatus" class="stat-value">--</span>
            </div>
            
            <h4 style="margin-top: 1.5rem; margin-bottom: 0.5rem; color:#f8fafc">Alert Log</h4>
            <div class="alert-log" id="alertLog">
                <!-- Alerts go here -->
            </div>
        </div>
    </div>

    <div class="connection-status">
        <div class="dot" id="connDot"></div>
        <span id="connText">Disconnected</span>
    </div>

    <script>
        // Chart.js Setup
        const ctx = document.getElementById('sensorChart').getContext('2d');
        const sensorChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Timestamps
                datasets: [
                    {
                        label: 'Live Temperature (°F)',
                        data: [],
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true
                    },
                    {
                        label: '5-Min Moving Avg (°F)',
                        data: [],
                        borderColor: '#f472b6',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        tension: 0.3,
                        pointRadius: 0
                    },
                    {
                        label: 'Threshold (100°F)',
                        data: [],
                        borderColor: '#ef4444',
                        borderWidth: 1,
                        borderDash: [10, 5],
                        pointRadius: 0,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: {
                    duration: 0 // Turn off animation for snappy updates
                },
                scales: {
                    x: {
                        grid: { color: '#334155' },
                        ticks: { color: '#94a3b8' }
                    },
                    y: {
                        grid: { color: '#334155' },
                        ticks: { color: '#94a3b8' },
                        suggestedMin: 60,
                        suggestedMax: 110
                    }
                },
                plugins: {
                    legend: {
                        labels: { color: '#f8fafc' }
                    }
                }
            }
        });

        // WebSocket Setup
        const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const wsUrl = `${wsProtocol}//${window.location.host}/ws`;
        
        let ws;

        function connectWebSocket() {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                document.getElementById('connDot').classList.add('connected');
                document.getElementById('connText').innerText = 'Connected (Live)';
            };

            ws.onclose = () => {
                document.getElementById('connDot').classList.remove('connected');
                document.getElementById('connText').innerText = 'Disconnected - Reconnecting...';
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (err) => {
                console.error("WebSocket Error:", err);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                updateDashboard(data);
            };
        }

        function updateDashboard(data) {
            const timeStr = new Date(data.timestamp).toLocaleTimeString();
            
            // 1. Update Chart
            const maxPoints = 60; // keep last 60 seconds on screen
            
            sensorChart.data.labels.push(timeStr);
            sensorChart.data.datasets[0].data.push(data.temperature);
            sensorChart.data.datasets[1].data.push(data.moving_avg);
            sensorChart.data.datasets[2].data.push(100.0); // threshold line

            if (sensorChart.data.labels.length > maxPoints) {
                sensorChart.data.labels.shift();
                sensorChart.data.datasets[0].data.shift();
                sensorChart.data.datasets[1].data.shift();
                sensorChart.data.datasets[2].data.shift();
            }
            
            sensorChart.update();

            // 2. Update Stats Widget
            document.getElementById('valTemp').innerText = `${data.temperature.toFixed(1)} °F`;
            document.getElementById('valAvg').innerText = `${data.moving_avg.toFixed(1)} °F`;
            document.getElementById('valVib').innerText = `${data.vibration.toFixed(2)} g`;
            document.getElementById('valZ').innerText = data.z_score.toFixed(2);
            
            const statusEl = document.getElementById('valStatus');
            statusEl.innerText = data.status;
            statusEl.className = 'stat-value';
            if(data.status === 'CRITICAL') statusEl.classList.add('critical');
            else if(data.status === 'WARNING') statusEl.classList.add('warning');
            else statusEl.classList.add('normal');

            // 3. Handle Alerts
            if (data.alert) {
                const logEl = document.getElementById('alertLog');
                const alertDiv = document.createElement('div');
                alertDiv.className = 'alert-item';
                alertDiv.innerHTML = `<strong>[${timeStr}] ALERT:</strong> ${data.alert.message}<br>
                                      Temp: ${data.alert.current}°F (Avg: ${data.alert.avg_5m}°F)<br>
                                      Deviation: +${data.alert.sigma} sigma`;
                
                logEl.insertBefore(alertDiv, logEl.firstChild);
                
                // Keep only last 10 alerts
                if (logEl.children.length > 10) {
                    logEl.removeChild(logEl.lastChild);
                }
            }
        }

        // Initialize
        connectWebSocket();
    </script>
</body>
</html>
