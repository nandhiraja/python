<!DOCTYPE html>
<html>
    <head>
        <title>Chat Application</title>
        <link rel="stylesheet" href="./style.css">
        <meta name="viewport" content="width=device-width">
        <script src="./index.js" defer></script>
    </head>
    <body>
          <aside>
            <div class="app-name">WeTalk 
                <select id="user-id">
                        <option value="login">Login</option> 
                        <option value="nandhiraja">Nandhiraja</option>  
                        <option value="ragu">Ragu</option>
                        <option value="ramesh">Ramesh</option> 
                        <option value="suresh">Suresh</option> 
                        <option value="guest">Guest</option> 

                </select>
            </div>
            <div class="active-rooms">Active Rooms
                <div class="room-join">
                    <input type="text" id="room-join-input">
                    <button id="room-join-btn">Join</button>
                </div>
                <div class="room-area">
                    <!-- available room will fill in runtime -->
                </div>
           </div>
           
        </aside>
        <section id="chat-container">

        <header>
            <h2 id="user-name">Welcome to WeTalk</h2>
            <div class="head-info">
            <div class="online-status" ></div>
            <div id="typing-indicator" style="display: block">         </div>
            </div>

        </header>

        <section id="chat-area">
          <!-- Chat message are update by backend -->
        </section>
          <section class="input-area">
            <input id='user-input' "type="text" autofocus placeholder="Type message">
            <button id="send-btn">Send</button>
          </section>
        </section>

    
    </body>
</html>
