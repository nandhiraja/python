<!DOCTYPE html>
<html>
    <head>
        <title>Chat Application</title>
        <link rel="stylesheet" href="./style.css">
        <meta name="viewport" content="width=device-width">
    </head>
    <body>
          <aside>
            <div class="app-name">WeTalk 
                <select id="user-id">
                        <option value="login">Login</option> 
                        <option value="login">Nandhiraja</option>  
                        <option value="login">Ragu</option> 
                        <option value="login">Guest</option> 

                </select>
            </div>
            <div class="active-rooms">Active Rooms
            <div class="room-join">
                <input type="text" id="room-join-input">
                <button id="room-join-btn">Join</button>
            </div>
            <div id='general' data-room-id='general'class="room open">General
                    <div class="typing-indicator">Typing....</div>

            </div>
            <div id='office'  data-room-id='office'class="room"> Office</div>
            <div id='Coder'   data-room-id='coder'class="room"> Coder</div>
           </div>
           
        </aside>
        <section id="chat-container">

        <header>
            <h2 id="user-name">General | Room</h2>
            <div class="online-status">Online 3
            <div class="typing-indicator">Typing....</div>
            </div>

        </header>

        <section id="chat-area">
            <div class="sender message">
                Hello,How are you?
                <div class="sender-time timestamp">10:24 pm</div>
            </div>
            <div class="receiver message">
                I'am fine,what about you?
                <div class="receiver-time timestamp">10:25 pm</div>
            </div>
        </section>
          <section class="input-area">
            <input id='user-input' "type="text" autofocus placeholder="Type message">
            <button id="send-btn">Send</button>
          </section>
        </section>

    
    </body>
</html>
