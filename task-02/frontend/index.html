<!DOCTYPE html>
<html>
    <head>
        <title>Chat Application</title>
        <link rel="stylesheet" href="./style.css">
        <meta name="viewport" content="width=device-width">
    </head>
    <body>
          <aside>
            <div class="app-name">WeTalk </div>
            <div class="contacts active">Friend</div>
            <div class="contacts"> Office</div>
            <div class="contacts"> Relative</div>

        </aside>
        <section id="chat-container">

        <header>
            <h2 id="user-name">My-Friend</h2>
        </header>

        <section id="chat-area">
            <div class="sender message">
                Hello,How are you?
                <div class="sender-time timestamp">10:24 pm</div>
            </div>
            <div class="receiver message">
                I'am fine,what about you?
                <div class="receiver-time timestamp">10:25 pm</div>
            </div>
        </section>
          <section id="input-area">
            <input id='user-input' "type="text" autofocus placeholder="Type message">
            <button id="send-btn">Send</button>
          </section>
        </section>

    
    </body>
</html>
